name: Release application

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven GitHub access
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.m2"
          if [ -f "$HOME/.m2/settings.xml" ] && grep -q 'https://maven.pkg.github.com/nabu-platform/maven' "$HOME/.m2/settings.xml"; then
            echo 'GitHub Maven endpoint already configured in settings.xml'
            exit 0
          fi
          cat > "$HOME/.m2/settings.xml" <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>__MAVEN_BUILD_USER__</username>
                <password>__MAVEN_BUILD_TOKEN__</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/nabu-platform/maven</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/nabu-platform/maven</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
          python3 -c "import os; from pathlib import Path; path = Path(os.path.expanduser('~/.m2/settings.xml')); text = path.read_text(); text = text.replace('__MAVEN_BUILD_USER__', os.environ['MAVEN_BUILD_USER']); text = text.replace('__MAVEN_BUILD_TOKEN__', os.environ['MAVEN_BUILD_TOKEN']); path.write_text(text)"
        env:
          MAVEN_BUILD_USER: ${{ secrets.MAVEN_BUILD_USER }}
          MAVEN_BUILD_TOKEN: ${{ secrets.MAVEN_BUILD_TOKEN }}

      - name: Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Check out poms repository
        uses: actions/checkout@v4
        with:
          repository: nabu-platform/poms
          path: .tmp

      - name: Prepare core parent from published BOM
        working-directory: .tmp
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://maven.pkg.github.com/nabu-platform/maven/be/nabu/core-bom/1.0-SNAPSHOT"
          auth="$MAVEN_BUILD_USER:$MAVEN_BUILD_TOKEN"
          metadata="$RUNNER_TEMP/core-bom-metadata.xml"
          curl -fsSL -u "$auth" "$base_url/maven-metadata.xml" -o "$metadata"
          value=$(python3 -c "import sys, xml.etree.ElementTree as ET; root = ET.parse(sys.argv[1]).getroot(); matches = [(node.findtext('updated') or '', node.findtext('value') or '') for node in root.findall('./versioning/snapshotVersions/snapshotVersion') if node.findtext('extension') == 'pom']; assert matches, 'Could not resolve snapshot POM version from metadata'; print(max(matches)[1])" "$metadata")
          python3 -c "import sys; from pathlib import Path; source = Path(sys.argv[1]); target = Path(sys.argv[2]); version = sys.argv[3]; text = source.read_text(); text = text.replace('<artifactId>core-local-bom</artifactId>', '<artifactId>core-bom</artifactId>'); text = text.replace('<artifactId>core-bom</artifactId>\n\t\t\t\t<version>1.0-SNAPSHOT</version>', f'<artifactId>core-bom</artifactId>\n\t\t\t\t<version>{version}</version>'); target.write_text(text)" core.xml "$RUNNER_TEMP/core-parent.xml" "$value"
          mvn -s "$HOME/.m2/settings.xml" -B install:install-file -Dpackaging=pom -Dfile="$RUNNER_TEMP/core-parent.xml" -DpomFile="$RUNNER_TEMP/core-parent.xml"
        env:
          MAVEN_BUILD_USER: ${{ secrets.MAVEN_BUILD_USER }}
          MAVEN_BUILD_TOKEN: ${{ secrets.MAVEN_BUILD_TOKEN }}

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          if [ -z "$release_version" ]; then
            echo 'Could not determine release version from tag'
            exit 1
          fi
          echo "value=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set application version
        run: mvn -s "$HOME/.m2/settings.xml" -B versions:set -DnewVersion=${{ steps.version.outputs.value }} -DgenerateBackupPoms=false

      - name: Prepare signing keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$SIGN_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/github-ci-signing.jks"
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}

      - name: Build application zip
        run: >-
          mvn -s "$HOME/.m2/settings.xml" -B -Duser.timezone=UTC clean package
          -Dsign.keystore=$RUNNER_TEMP/github-ci-signing.jks
          -Dsign.storetype=JKS
          -Dsign.alias=${{ secrets.SIGN_KEY_ALIAS }}
          -Dsign.storepass=${{ secrets.SIGN_KEYSTORE_PASSWORD }}
          -Dsign.keypass=${{ secrets.SIGN_KEY_PASSWORD }}

      - name: Collect zip asset
        shell: bash
        run: |
          set -euo pipefail
          version='${{ steps.version.outputs.value }}'
          zip_asset="target/developer-${version}.zip"
          if [ ! -f "$zip_asset" ]; then
            echo "Expected built artifact not found: $zip_asset"
            exit 1
          fi
          cp "$zip_asset" "$RUNNER_TEMP/packaging-developer-${version}.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaging-developer-zip
          path: ${{ runner.temp }}/packaging-developer-${{ steps.version.outputs.value }}.zip

  build-platform-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_type: deb
            package_glob: '*.deb'
            icon: eai-developer/src/main/resources/icon.png
          - os: windows-latest
            package_type: exe
            package_glob: '*.exe'
            icon: eai-developer/src/main/resources/icon.png
          - os: macos-latest
            package_type: dmg
            package_glob: '*.dmg'
            icon: eai-developer/src/main/resources/icon.icns
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven GitHub access
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.m2"
          if [ -f "$HOME/.m2/settings.xml" ] && grep -q 'https://maven.pkg.github.com/nabu-platform/maven' "$HOME/.m2/settings.xml"; then
            echo 'GitHub Maven endpoint already configured in settings.xml'
            exit 0
          fi
          cat > "$HOME/.m2/settings.xml" <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>__MAVEN_BUILD_USER__</username>
                <password>__MAVEN_BUILD_TOKEN__</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/nabu-platform/maven</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/nabu-platform/maven</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
          python3 -c "import os; from pathlib import Path; path = Path(os.path.expanduser('~/.m2/settings.xml')); text = path.read_text(); text = text.replace('__MAVEN_BUILD_USER__', os.environ['MAVEN_BUILD_USER']); text = text.replace('__MAVEN_BUILD_TOKEN__', os.environ['MAVEN_BUILD_TOKEN']); path.write_text(text)"
        env:
          MAVEN_BUILD_USER: ${{ secrets.MAVEN_BUILD_USER }}
          MAVEN_BUILD_TOKEN: ${{ secrets.MAVEN_BUILD_TOKEN }}

      - name: Set up Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Check out poms repository
        uses: actions/checkout@v4
        with:
          repository: nabu-platform/poms
          path: .tmp

      - name: Prepare core parent from published BOM
        working-directory: .tmp
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://maven.pkg.github.com/nabu-platform/maven/be/nabu/core-bom/1.0-SNAPSHOT"
          auth="$MAVEN_BUILD_USER:$MAVEN_BUILD_TOKEN"
          metadata="$RUNNER_TEMP/core-bom-metadata.xml"
          curl -fsSL -u "$auth" "$base_url/maven-metadata.xml" -o "$metadata"
          value=$(python3 -c "import sys, xml.etree.ElementTree as ET; root = ET.parse(sys.argv[1]).getroot(); matches = [(node.findtext('updated') or '', node.findtext('value') or '') for node in root.findall('./versioning/snapshotVersions/snapshotVersion') if node.findtext('extension') == 'pom']; assert matches, 'Could not resolve snapshot POM version from metadata'; print(max(matches)[1])" "$metadata")
          python3 -c "import sys; from pathlib import Path; source = Path(sys.argv[1]); target = Path(sys.argv[2]); version = sys.argv[3]; text = source.read_text(); text = text.replace('<artifactId>core-local-bom</artifactId>', '<artifactId>core-bom</artifactId>'); text = text.replace('<artifactId>core-bom</artifactId>\n\t\t\t\t<version>1.0-SNAPSHOT</version>', f'<artifactId>core-bom</artifactId>\n\t\t\t\t<version>{version}</version>'); target.write_text(text)" core.xml "$RUNNER_TEMP/core-parent.xml" "$value"
          mvn -s "$HOME/.m2/settings.xml" -B install:install-file -Dpackaging=pom -Dfile="$RUNNER_TEMP/core-parent.xml" -DpomFile="$RUNNER_TEMP/core-parent.xml"
        env:
          MAVEN_BUILD_USER: ${{ secrets.MAVEN_BUILD_USER }}
          MAVEN_BUILD_TOKEN: ${{ secrets.MAVEN_BUILD_TOKEN }}

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          if [ -z "$release_version" ]; then
            echo 'Could not determine release version from tag'
            exit 1
          fi
          echo "value=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set application version
        run: mvn -s "$HOME/.m2/settings.xml" -B versions:set -DnewVersion=${{ steps.version.outputs.value }} -DgenerateBackupPoms=false

      - name: Prepare signing keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$SIGN_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/github-ci-signing.jks"
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}

      - name: Build application zip
        run: >-
          mvn -s "$HOME/.m2/settings.xml" -B -Duser.timezone=UTC clean package
          -Dsign.keystore=$RUNNER_TEMP/github-ci-signing.jks
          -Dsign.storetype=JKS
          -Dsign.alias=${{ secrets.SIGN_KEY_ALIAS }}
          -Dsign.storepass=${{ secrets.SIGN_KEYSTORE_PASSWORD }}
          -Dsign.keypass=${{ secrets.SIGN_KEY_PASSWORD }}

      - name: Prepare packaging workspace
        shell: bash
        run: |
          set -euo pipefail
          workspace="$RUNNER_TEMP/developer-package"
          mkdir -p "$workspace"
          cp "target/developer-${{ steps.version.outputs.value }}.zip" "$workspace/developer.zip"
          python3 -c "import pathlib, zipfile; workspace = pathlib.Path(r'$workspace'); zip_path = workspace / 'developer.zip'; zipfile.ZipFile(zip_path).extractall(workspace)"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
        id: package_workspace

      - name: Build jpackage artifact
        id: jpackage
        shell: bash
        run: |
          set -euo pipefail
          workspace='${{ steps.package_workspace.outputs.workspace }}'
          version='${{ steps.version.outputs.value }}'
          main_jar=$(find "$workspace/lib" -maxdepth 1 -type f -name 'eai-developer-*.jar' | head -n 1)
          if [ -z "$main_jar" ]; then
            echo 'Could not find eai-developer main jar'
            exit 1
          fi
          app_version=$(python3 -c "import re, sys; version = sys.argv[1]; clean = re.sub(r'[^0-9.]', '.', version); parts = [p for p in clean.split('.') if p]; print('.'.join(parts[:3]) if parts else '1.0.0')" "$version")
          out_dir="$RUNNER_TEMP/jpackage-out"
          mkdir -p "$out_dir"
          jpackage \
            --input "$workspace/lib" \
            --name 'Nabu Developer' \
            --java-options '-Xmx8096m -Dprism.maxvram=2048m -Dvm.screenshot=true -Dshow.hidden=false -Dbe.nabu.eai.repository.cacheModules=true -Dsshj=true -Dsun.java2d.xrender=false -Dversion=2 -Ddevelopment=true' \
            --main-jar "$(basename "$main_jar")" \
            --main-class 'be.nabu.eai.developer.Main' \
            --about-url 'https://nabu.be' \
            --description 'The IDE of the Nabu Platform' \
            --license-file 'LICENSE' \
            --icon '${{ matrix.icon }}' \
            --app-version "$app_version" \
            --vendor 'Alexander Verbruggen' \
            --type '${{ matrix.package_type }}' \
            --dest "$out_dir"
          asset=$(find "$out_dir" -maxdepth 1 -type f -name '${{ matrix.package_glob }}' | head -n 1)
          if [ -z "$asset" ]; then
            echo 'Expected jpackage artifact not found'
            exit 1
          fi
          echo "path=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaging-developer-${{ matrix.package_type }}
          path: ${{ steps.jpackage.outputs.path }}

  release:
    runs-on: ubuntu-latest
    needs:
      - build-zip
      - build-platform-package
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: packaging-developer-zip
          path: artifacts/zip

      - name: Download linux installer
        uses: actions/download-artifact@v4
        with:
          name: packaging-developer-deb
          path: artifacts/deb

      - name: Download windows installer
        uses: actions/download-artifact@v4
        with:
          name: packaging-developer-exe
          path: artifacts/exe

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: packaging-developer-dmg
          path: artifacts/dmg

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/zip/*
            artifacts/deb/*
            artifacts/exe/*
            artifacts/dmg/*
          generate_release_notes: true
